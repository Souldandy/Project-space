<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ username }} - Flight Log</title>
    <style>
        body {
            background-color: #0b0e14;
            color: #f9f9f9;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; position: relative;
        }

        .space-trophy-bg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 650px; height: 650px; color: rgba(255, 215, 0, 0.035);
            clip-path: polygon(15% 0%, 85% 0%, 85% 35%, 68% 55%, 56% 55%, 56% 78%, 78% 78%, 78% 88%, 22% 88%, 22% 78%, 44% 78%, 44% 55%, 32% 55%, 15% 35%);
            z-index: -2; pointer-events: none;
        }

        .log-header {
            width: 100%; max-width: 1000px;
            background-color: #64b4ff; 
            color: #0f141c;
            display: flex; justify-content: space-between; align-items: center;
            padding: 25px 40px; margin-top: 50px; margin-bottom: 25px;
            border-radius: 4px; box-sizing: border-box;
        }

        .header-left .main-title { font-size: 0.8rem; font-weight: 800; letter-spacing: 2px; margin: 0; opacity: 0.8; }
        .header-left .pilot-name { font-size: 2.2rem; font-weight: 900; margin: 0; text-transform: uppercase; }
        .header-right { text-align: right; display: flex; align-items: center; }
        .header-right .status-label { font-size: 0.8rem; font-weight: 800; color: #0b0e14; background: rgba(255,255,255,0.3); padding: 6px 14px; border-radius: 2px; }

        .table-labels {
            width: 100%; max-width: 1000px;
            display: flex; padding: 10px 40px; box-sizing: border-box;
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1.5px; color: #76808c; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .col-date { width: 30%; }
        .col-time { width: 20%; }
        .col-score { width: 25%; text-align: center; }
        .col-result { width: 25%; text-align: right; }

        .match-list { width: 100%; max-width: 1000px; display: flex; flex-direction: column; gap: 4px; margin-bottom: 50px; }

        .match-row {
            display: flex; align-items: center;
            background-color: #181e29;
            padding: 0 40px; height: 70px;
            transition: all 0.2s; border-left: 0px solid #64b4ff;
        }

        .match-row:hover { background-color: #222a3a; border-left: 4px solid #64b4ff; cursor: crosshair; }

        .date-val { font-size: 1.1rem; font-weight: 700; color: #f9f9f9; }
        .time-val { font-size: 1rem; font-weight: 500; color: #76808c; }
        .score-val { font-size: 1.4rem; font-weight: 800; color: #64b4ff; text-align: center; width: 100%; display: block;}
        .result-tag { 
            font-size: 0.8rem; font-weight: 800; letter-spacing: 1px;
            color: #14ff64; border: 1px solid rgba(20, 255, 100, 0.3);
            padding: 5px 12px; border-radius: 3px; display: inline-block;
        }

        .avatar-box { width: 40px; height: 40px; background: #0b0e14; margin-right: 20px; position: relative; border: 1px solid rgba(255,255,255,0.1); }
        .avatar-box::after {
            content: ""; position: absolute; top: 10px; left: 10px;
            width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent;
            border-bottom: 18px solid #64b4ff;
        }

        .match-row:first-child { background-color: #1d2533; border-bottom: 1px solid rgba(100, 180, 255, 0.2); }
    </style>
</head>
<body>

    <div class="space-trophy-bg"></div>

    <div class="log-header">
        <div class="header-left">
            <p class="main-title">OFFICIAL FLIGHT LOG</p>
            <p class="pilot-name">{{ username }}</p>
        </div>
        <div class="header-right">
            <span class="status-label">ACTIVE DUTY</span>
        </div>
    </div>

    <div class="table-labels">
        <div class="col-date">Mission Date</div>
        <div class="col-time">Timestamp (WAT)</div>
        <div class="col-score">Final Score</div>
        <div class="col-result">Mission Status</div>
    </div>

    <div class="match-list">
        {% for match in history %}
        <div class="match-row">
            <div class="col-date">
                <div style="display: flex; align-items: center;">
                    <div class="avatar-box"></div>
                    <span class="date-val">{{ match.date }}</span>
                </div>
            </div>
            <div class="col-time">
                <span class="time-val">{{ match.time }} WAT</span>
            </div>
            <div class="col-score">
                <span class="score-val">{{ match.score }}</span>
            </div>
            <div class="col-result">
                <span class="result-tag">COMPLETED</span>
            </div>
        </div>
        {% endfor %}
    </div>

</body>
</html>
