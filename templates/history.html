<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match History - {{ username }}</title>
    <style>
        body {
            background-color: #05000f;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        .container {
            background-color: #0c0222;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
            border: 2px solid #7800b4;
            box-shadow: 0 0 15px #7800b4;
            min-width: 400px;
        }
        h1 {
            color: #32ff64;
            text-shadow: 0 0 10px #32ff64;
            margin-bottom: 5px;
        }
        h2 {
            color: #64b4ff;
            margin-bottom: 30px;
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        li {
            background-color: #17073a;
            margin: 10px 0;
            padding: 12px;
            border-radius: 5px;
            font-size: 18px;
            border-left: 5px solid #7800b4;
            display: flex;
            justify-content: space-between;
        }
        .match-id {
            color: #a0a0a0;
        }
        .score-val {
            color: #ffb400;
            font-weight: bold;
        }
        .btn {
            background-color: #7800b4;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
            margin-top: 20px;
        }
        .btn:hover {
            background-color: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SPACE PEW</h1>
        <h2>PILOT LOGS: {{ username }}</h2>
        
        {% if matches %}
            <ul>
                {% for m in matches %}
                <li>
                    <span class="match-id">Match #{{ m.id }}</span>
                    <span class="score-val">{{ m.score }} PTS</span>
                </li>
                {% endfor %}
            </ul>
        {% else %}
            <p style="color: #ff3232;">No match data recorded for this pilot yet.</p>
        {% endif %}
        
        <br>
        <a href="/leaderboard" class="btn">GLOBAL LEADERBOARD</a>
    </div>
</body>
</html>
