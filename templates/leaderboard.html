<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Pew - Global Leaderboard</title>
    <style>
        body {
            background-color: #05000f;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        .container {
            background-color: #0c0222;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
            border: 2px solid #7800b4;
            box-shadow: 0 0 15px #7800b4;
            min-width: 500px;
        }
        h1 {
            color: #32ff64;
            text-shadow: 0 0 10px #32ff64;
            margin-bottom: 5px;
            font-size: 36px;
        }
        h2 {
            color: #64b4ff;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th {
            border-bottom: 2px solid #7800b4;
            color: #64b4ff;
            padding: 12px;
            font-size: 18px;
        }
        td {
            padding: 12px;
            font-size: 18px;
            border-bottom: 1px solid #17073a;
        }
        tr:hover {
            background-color: #17073a;
        }
        .rank { color: #a0a0a0; font-weight: bold; }
        .pilot-name { color: #ffffff; text-align: left; padding-left: 40px; }
        .score-val { color: #ffb400; font-weight: bold; text-align: right; padding-right: 40px; }
        .btn {
            background-color: #7800b4;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
            margin-top: 25px;
        }
        .btn:hover {
            background-color: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SPACE PEW</h1>
        <h2>GLOBAL LEADERBOARD</h2>
        
        <table>
            <thead>
                <tr>
                    <th style="width: 15%;">RANK</th>
                    <th style="text-align: left; padding-left: 40px;">PILOT</th>
                    <th style="text-align: right; padding-right: 40px;">SCORE</th>
                </tr>
            </thead>
            <tbody>
                {% if matches %}
                    {% for m in matches %}
                    <tr>
                        <td class="rank">#{{ loop.index }}</td>
                        <td class="pilot-name">
                            <a href="/match-history/{{ m.pilot.username }}" style="color: white; text-decoration: none; border-bottom: 1px dashed #7800b4;">
                                {{ m.pilot.username }}
                            </a>
                        </td>
                        <td class="score-val">{{ m.score }} PTS</td>
                    </tr>
                    {% endfor %}
                {% else %}
                    <tr>
                        <td colspan="3" style="color: #ff3232; padding: 20px;">No space combat data recorded yet.</td>
                    </tr>
                {% endif %}
            </tbody>
        </table>
        
        <br>
        <a href="/register" class="btn">REGISTER NEW PILOT</a>
    </div>
</body>
</html>
