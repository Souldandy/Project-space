<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilot Registration</title>
    <style>
        body { background-color: #05000f; color: #ffffff; font-family: Arial, sans-serif; text-align: center; padding-top: 100px; }
        .form-container { background-color: #0c0222; padding: 30px; border-radius: 10px; display: inline-block; border: 2px solid #7800b4; box-shadow: 0 0 15px #7800b4; }
        input[type="text"] { padding: 10px; width: 200px; border-radius: 5px; border: 1px solid #64b4ff; font-size: 16px; }
        input[type="submit"] { background-color: #32ff64; color: #000000; border: none; padding: 10px 20px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>SPACE PEW</h1>
    <h2>PILOT REGISTRATION</h2>
    <div class="form-container">
        <form method="POST" action="/register">
            <p>Enter Pilot Identifier Name:</p>
            <input type="text" name="username" placeholder="e.g., Timilehin" required autocomplete="off">
            <br><br>
            <input type="submit" value="REGISTER PILOT">
        </form>
    </div>
</body>
</html>
